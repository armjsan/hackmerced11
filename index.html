<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot - Medical Intake Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="bot-avatar-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h1>MedBot</h1>
                    <span class="status-dot"></span>
                    <span class="status-text">Online</span>
                </div>
            </div>
            <div class="header-right">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span class="progress-text" id="progressText">Step 1 of 12</span>
            </div>
        </header>

        <!-- Chat Messages -->
        <main class="chat-messages" id="chatMessages">
            <!-- Messages will be injected here by JS -->
        </main>

        <!-- Options Area -->
        <footer class="chat-footer" id="chatFooter">
            <div class="options-container" id="optionsContainer">
                <!-- Clickable options will be injected here -->
            </div>
            <div class="text-input-container" id="textInputContainer" style="display:none;">
                <input type="text" id="textInput" placeholder="Type your answer..." autocomplete="off">
                <button id="sendBtn" class="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Report Modal -->
    <div class="modal-overlay" id="reportModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your Medical Intake Report</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="reportContent">
                <!-- Report will be injected here -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-copy" id="copyBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copy to Clipboard
                </button>
                <button class="btn btn-pdf" id="downloadPdfBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download PDF
                </button>
                <button class="btn btn-restart" id="restartBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    Start Over
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
