{% extends "base.html" %}
{% block title %}Change Password - Triple Auth{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Change Your Password</h2>
    <p class="auth-subtitle">You must set a new password before continuing.</p>

    <form id="form-change" onsubmit="return false;">
        <div class="form-group">
            <label for="new_password_a">New Password</label>
            <input type="password" id="new_password_a" required placeholder="Min 8 characters" autofocus>
        </div>
        <div class="form-group">
            <label for="confirm_password_a">Confirm Password</label>
            <input type="password" id="confirm_password_a" required>
        </div>
        <div id="error-change" class="error-msg" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-change">Set New Password</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('form-change').addEventListener('submit', async () => {
    const errEl = document.getElementById('error-change');
    const btn = document.getElementById('btn-change');
    errEl.style.display = 'none';
    btn.disabled = true;

    const newPass = document.getElementById('new_password_a').value;
    const confirm = document.getElementById('confirm_password_a').value;

    if (newPass.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters';
        errEl.style.display = 'block';
        btn.disabled = false;
        return;
    }
    if (newPass !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        btn.disabled = false;
        return;
    }

    try {
        const res = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_password_a: newPass }),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = data.redirect || '/home';
        } else {
            errEl.textContent = data.error || 'Failed to change password';
            errEl.style.display = 'block';
        }
    } catch {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
    }
    btn.disabled = false;
});
</script>
{% endblock %}
